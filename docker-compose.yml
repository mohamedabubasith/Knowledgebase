version: "3.9"

services:
  cortex-kb:
    build: .
    restart: unless-stopped
    volumes:
      - chroma_data:/app/data/chroma
    expose:
      - "8080"
    labels:
      - "traefik.http.services.cortex-kb.loadbalancer.server.port=8080"
    networks:
      - default
      - coolify

volumes:
  chroma_data:

networks:
  default:
  coolify:
    external: true
