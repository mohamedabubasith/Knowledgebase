version: "3.9"

services:
  cortex-kb:
    build: .
    container_name: cortex-kb
    restart: unless-stopped
    volumes:
      - chroma_data:/app/data/chroma
    expose:
      - "8080"
    networks:
      - default
      - coolify
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 512M

volumes:
  chroma_data:

networks:
  default:
  coolify:
    external: true
